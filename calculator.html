<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧮 涨幅计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .calculator {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 30px;
            font-size: 1.5rem;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #aaa;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1.1rem;
            outline: none;
        }
        input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0,212,255,0.3);
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:active {
            transform: scale(0.98);
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            background: rgba(0,212,255,0.1);
            border-radius: 15px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #fff;
        }
        .result-item:last-child {
            margin-bottom: 0;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 1.2rem;
            font-weight: bold;
            color: #00d4ff;
        }
        .label {
            color: #aaa;
        }
        .positive {
            color: #00ff88 !important;
        }
        .negative {
            color: #ff4444 !important;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>🧮 涨幅计算器</h1>
        
        <div class="input-group">
            <label>A = 初始价格（买入价）</label>
            <input type="number" id="A" placeholder="例如: 210" step="0.01">
        </div>
        
        <div class="input-group">
            <label>B = 当前价格</label>
            <input type="number" id="B" placeholder="例如: 222" step="0.01">
        </div>
        
        <div class="input-group">
            <label>C = 投入金额</label>
            <input type="number" id="C" placeholder="例如: 1000" step="0.01">
        </div>
        
        <button onclick="calculate()">计算收益</button>
        
        <div class="result" id="result">
            <div class="result-item">
                <span class="label">📈 涨幅</span>
                <span id="rate"></span>
            </div>
            <div class="result-item">
                <span class="label">💰 盈利</span>
                <span id="profit"></span>
            </div>
            <div class="result-item">
                <span class="label">💵 总资产</span>
                <span id="total"></span>
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            const A = parseFloat(document.getElementById('A').value);
            const B = parseFloat(document.getElementById('B').value);
            const C = parseFloat(document.getElementById('C').value);
            
            if (isNaN(A) || isNaN(B) || isNaN(C)) {
                alert('请填写所有字段！');
                return;
            }
            
            if (A <= 0 || C <= 0) {
                alert('初始价格和投入金额必须大于0！');
                return;
            }
            
            // 计算
            const rate = (B - A) / A * 100;
            const profit = C * (B - A) / A;
            const total = C + profit;
            
            // 显示结果
            const resultDiv = document.getElementById('result');
            const rateSpan = document.getElementById('rate');
            const profitSpan = document.getElementById('profit');
            const totalSpan = document.getElementById('total');
            
            rateSpan.textContent = rate.toFixed(2) + '%';
            rateSpan.className = rate >= 0 ? 'positive' : 'negative';
            
            profitSpan.textContent = (profit >= 0 ? '+' : '') + profit.toFixed(2) + ' USDT';
            profitSpan.className = profit >= 0 ? 'positive' : 'negative';
            
            totalSpan.textContent = total.toFixed(2) + ' USDT';
            
            resultDiv.classList.add('show');
        }
    </script>
</body>
</html>
